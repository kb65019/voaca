:root{--primary:#27ae60;--danger:#e74c3c;--dark:#8B0000;--bg:#8B0000}body{font-family:Tahoma,sans-serif;background:var(--bg);margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh}#login-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--dark);display:flex;justify-content:center;align-items:center;z-index:9999}.login-box{background:#fff;padding:30px;border-radius:40px;box-shadow:0 10px 25px rgba(0,0,0,.2);text-align:center;width:90%;max-width:350px}.login-box input{width:100%;padding:12px;margin-bottom:15px;border:1px solid #ddd;border-radius:50px;text-align:center;box-sizing:border-box}.login-box button{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:50px;cursor:pointer;font-weight:700}#admin-content{display:none;width:100%;max-width:600px;padding:20px}.admin-container{background:#fff;padding:25px;border-radius:40px;box-shadow:0 5px 15px rgba(0,0,0,.1)}h1{text-align:center;color:var(--dark)}.bulk-control{background:#fdf2f2;padding:15px 20px;border-radius:30px;margin-bottom:20px;border:2px solid var(--danger);display:flex;justify-content:space-between;align-items:center}.product-row{display:flex;justify-content:space-between;align-items:center;padding:15px;border-bottom:1px solid #eee}.switch{position:relative;display:inline-block;width:55px;height:28px}.switch input{opacity:0;width:0;height:0}.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:#ccc;transition:.4s;border-radius:50px}.slider:before{position:absolute;content:"";height:20px;width:20px;left:4px;bottom:4px;background-color:#fff;transition:.4s;border-radius:50%}input:checked+.slider{background-color:var(--primary)}input:checked+.slider:before{transform:translateX(27px)}#custom-confirm{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:10000;justify-content:center;align-items:center;backdrop-filter:blur(5px)}.confirm-box{background:#fff;padding:30px;border-radius:40px;text-align:center;max-width:320px;width:85%}.confirm-btns{display:flex;gap:10px;margin-top:20px}.confirm-btns button{flex:1;padding:12px;border:none;border-radius:50px;cursor:pointer;font-weight:700}.btn-yes{background:var(--primary);color:#fff}.logout-btn{display:block;width:100%;margin-top:20px;padding:10px;background:#95a5a6;color:#fff;border:none;border-radius:50px;cursor:pointer}
</style>
</head>

<div id="custom-confirm"><div class="confirm-box"><h3 id="confirm-msg"></h3><p>سيتم تعديل حالة جميع الأصناف.</p><div class="confirm-btns"><button class="btn-yes" id="confirm-btn-yes">نعم</button><button class="btn-no" id="confirm-btn-no">إلغاء</button></div></div></div>
<div id="login-overlay"><div class="login-box"><h2>إدارة مطعم نكشة</h2><input type="email" id="admin-email" placeholder="البريد الإلكتروني"><input type="password" id="admin-pass" placeholder="كلمة السر"><button id="btn-login">دخول</button><p id="error-msg" style="color:var(--danger);display:none;margin-top:10px"></p></div></div>
<div id="admin-content"><div class="admin-container"><h1>إدارة مطعم نكشة</h1><div class="bulk-control"><strong>تحكم كامل بالأصناف</strong><label class="switch"><input type="checkbox" id="master-toggle"><span class="slider"></span></label></div><div id="admin-list">جاري التحميل...</div><button class="logout-btn" id="btn-logout">تسجيل خروج</button><center style="margin-top:20px;font-size:.8rem;color:#777"><h4>Developed and Designed by khaled badran</h4></center></div></div>
