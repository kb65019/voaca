<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بحث الذكاء الاصطناعي - نكشه المركزي</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">نكشه المركزي</div>
            <h1>اسأل الذكاء الاصطناعي عن مطعمنا</h1>
            <p>يمكنك السؤال عن المنيو، الأسعار، التوصيل، أو أي شيء يخص المطعم.</p>
        </header>

        <main>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="ماذا تريد أن تعرف؟ (مثلاً: ما هي أنواع المندي المتوفرة؟)">
                <button id="search-btn">
                    <span class="icon">✨</span> اسأل
                </button>
            </div>

            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <span>جاري التفكير...</span>
            </div>

            <div id="response-container" class="hidden">
                <div class="response-header">
                    <span class="ai-badge">AI Response</span>
                </div>
                <div id="ai-response" class="response-text"></div>
                <div class="response-footer">
                    * تعتمد الإجابات على معلومات موقع نكشه المركزي الرسمي.
                </div>
            </div>

            <div class="suggestions">
                <button class="suggest-tag">ما هو سعر الشاورما؟</button>
                <button class="suggest-tag">هل يوجد منسف؟</button>
                <button class="suggest-tag">أين يقع المطعم؟</button>
                <button class="suggest-tag">كيف يمكنني الطلب؟</button>
            </div>
        </main>

        <footer>
            <p>© 2026 جميع الحقوق محفوظة لـ <a href="https://nksha-almarkazi.com" target="_blank">نكشه المركزي</a></p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
