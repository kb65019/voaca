<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عرض المنتج بالواقع المعزز AR</title>

    <!-- استيراد مكتبة جوجل الخاصة بالـ 3D والـ AR -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 90%;
            max-width: 500px;
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 5px;
        }

        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }

        /* تصميم حاوية مجسم الـ 3D */
        model-viewer {
            width: 100%;
            height: 400px;
            background-color: #fafafa;
            border-radius: 15px;
            --poster-color: transparent;
        }

        /* تخصيص زر الـ AR ليظهر بشكل أنيق */
        #ar-button {
            background-color: #0071e3;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }

        #ar-button:hover {
            background-color: #0077ed;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ساعة يد كلاسيكية فاخرة</h1>
        <p>اسحب لتحريك الساعة، أو اضغط على زر AR لرؤيتها في غرفتك عبر الكاميرا</p>

        <!-- مستعرض الـ 3D من جوجل -->
        <!-- استخدمت مجسم مفتوح المصدر ومستضاف على سيرفرات موثوقة -->
        <model-viewer
            src="https://modelviewer.dev/shared-assets/models/glTFSampleModels/Watch/glTF-Binary/Watch.glb"
            ar
            ar-modes="webxr scene-viewer quick-look"
            camera-controls
            poster="https://modelviewer.dev/shared-assets/models/glTFSampleModels/Watch/Watch.png"
            shadow-intensity="1.5"
            environment-image="neutral"
            auto-rotate>

            <button slot="ar-button" id="ar-button">
                📱 عرض في الكاميرا (AR)
            </button>

        </model-viewer>
    </div>

</body>
</html>
