<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAFFA | Direct AR Launch</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { --accent: #D4AF37; }
        body { background: #000; color: white; margin: 0; overflow: hidden; font-family: sans-serif; }
        
        model-viewer {
            width: 100vw;
            height: 100vh;
            --poster-color: transparent;
        }

        /* The "Invisible" Trigger - Full screen button to satisfy user-gesture requirements */
        #ar-launcher {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .pulse-button {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4);
            animation: pulse 2s infinite;
            border: none;
            color: black;
            cursor: pointer;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(255, 255, 255, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }

        #ar-button { display: none; } /* Hidden, we trigger it via JS */
    </style>
</head>
<body>

    <!-- UI Overlay for gesture -->
    <div id="ar-launcher">
        <button onclick="launchAR()" class="pulse-button">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/>
            </svg>
        </button>
        <h1 class="mt-8 text-xl font-bold tracking-widest uppercase">Tap to Place in Room</h1>
        <p class="mt-2 text-white/40 text-sm">Initializing High-Fidelity 3D Environment</p>
    </div>

    <model-viewer 
        id="viewer"
        src="https://modelviewer.dev/shared-assets/models/Astronaut.glb" 
        ios-src="https://modelviewer.dev/shared-assets/models/Astronaut.usdz"
        ar
        ar-modes="webxr scene-viewer quick-look"
        camera-controls
        touch-action="pan-y"
        shadow-intensity="1"
        exposure="1"
    >
        <!-- This hidden slot is required for the AR engine -->
        <button slot="ar-button" id="ar-button"></button>
    </model-viewer>

    <script>
        const viewer = document.querySelector('#viewer');
        const launcher = document.querySelector('#ar-launcher');

        function launchAR() {
            // 1. Hide the launcher UI
            launcher.style.opacity = '0';
            setTimeout(() => { launcher.style.display = 'none'; }, 500);

            // 2. Programmatically trigger the AR session
            // This works because it's called from a click event
            viewer.activateAR();
        }

        // Error handling
        viewer.addEventListener('error', (e) => {
            console.error("AR Load Error:", e);
            alert("This device might not support WebAR. Ensure you are using Safari (iOS) or Chrome (Android) and an HTTPS connection.");
        });
    </script>
</body>
</html>
