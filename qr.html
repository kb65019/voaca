<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معاينة المنتج بالواقع المعزز AR</title>
    
    <!-- استدعاء مكتبة جوجل الرسمية للـ 3D والـ AR -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
        }

        .card {
            background: #ffffff;
            width: 90%;
            max-width: 450px;
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04);
            text-align: center;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1d1d1f;
        }

        p {
            font-size: 14px;
            color: #86868b;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        /* حاوية العرض ثلاثي الأبعاد */
        .viewer-container {
            position: relative;
            width: 100%;
            height: 380px;
            background: radial-gradient(circle, #ffffff 0%, #f2f2f2 100%);
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid #e5e5e7;
        }

        model-viewer {
            width: 100%;
            height: 100%;
            outline: none;
        }

        /* تصميم زر تشغيل الكاميرا والواقع المعزز */
        #ar-button {
            background-color: #0071e3;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(0, 113, 227, 0.3);
        }

        #ar-button:hover {
            background-color: #0077ed;
            transform: translateY(-1px);
        }

        #ar-button:active {
            transform: translateY(1px);
        }

        /* إخفاء الزر تلقائياً إذا كان جهاز المستخدم لا يدعم الـ AR مطلقاً */
        model-viewer:not([ar-status="not-presenting"]) #ar-button {
            display: none;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>ساعة يد ميكانيكية فاخرة</h1>
        <p>قم بتدوير الساعة لاستكشاف التفاصيل، أو اضغط على الزر أدناه لتجربتها داخل غرفتك عبر الكاميرا.</p>

        <div class="viewer-container">
            <!-- الـ model-viewer يستدعي موديل الساعة مباشرة بدقة عالية وإضاءة محيطية متوازنة -->
            <model-viewer 
                src="https://modelviewer.dev/shared-assets/models/glTFSampleModels/Watch/glTF-Binary/Watch.glb" 
                ar 
                ar-modes="webxr scene-viewer quick-look" 
                camera-controls 
                interaction-prompt="auto"
                shadow-intensity="2"
                shadow-softness="1"
                environment-image="neutral"
                auto-rotate
                auto-rotate-delay="2000">
                
                <!-- زر مخصص للـ AR يتم تفعيله عند الضغط -->
                <button slot="ar-button" id="ar-button">
                    📸 عرض مباشر في الكاميرا (AR)
                </button>
                
            </model-viewer>
        </div>
    </div>

</body>
</html>
